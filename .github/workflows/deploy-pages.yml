name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'scripts/build-github-pages.mjs'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install and build
        working-directory: frontend
        run: |
          npm install
          npm run build:pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Enable GitHub Pages (workflow source)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.event.repository.default_branch }}"
          API="https://api.github.com/repos/${REPO}/pages"
          AUTH=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          STATUS=$(curl -s -o /tmp/pages.json -w "%{http_code}" "${AUTH[@]}" "$API")

          if [ "$STATUS" = "404" ]; then
            echo "Enabling GitHub Pages with GitHub Actions as the source…"
            HTTP=$(curl -s -o /tmp/pages-post.json -w "%{http_code}" "${AUTH[@]}" -X POST "$API" \
              -d "{\"build_type\":\"workflow\",\"source\":{\"branch\":\"${BRANCH}\",\"path\":\"/\"}}")
            if [ "$HTTP" -ge 300 ]; then
              cat /tmp/pages-post.json
              echo "::error::Could not enable GitHub Pages (HTTP ${HTTP}). Enable manually: https://github.com/${REPO}/settings/pages → Source: GitHub Actions"
              exit 1
            fi
          elif [ "$STATUS" = "200" ]; then
            BUILD_TYPE=$(python3 -c "import json; print(json.load(open('/tmp/pages.json')).get('build_type',''))")
            if [ "$BUILD_TYPE" != "workflow" ]; then
              echo "Switching Pages build type to workflow…"
              curl -sf "${AUTH[@]}" -X PUT "$API" -d '{"build_type":"workflow"}'
            fi
          else
            cat /tmp/pages.json
            echo "::error::Unexpected Pages API response (HTTP ${STATUS}). Enable manually: https://github.com/${REPO}/settings/pages → Source: GitHub Actions"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry
        if: steps.deployment.outcome != 'success'
        run: sleep 45

      - name: Deploy to GitHub Pages (retry 2/3)
        if: steps.deployment.outcome != 'success'
        id: deployment2
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before final retry
        if: steps.deployment.outcome != 'success' && steps.deployment2.outcome != 'success'
        run: sleep 45

      - name: Deploy to GitHub Pages (retry 3/3)
        if: steps.deployment.outcome != 'success' && steps.deployment2.outcome != 'success'
        id: deployment3
        uses: actions/deploy-pages@v4

      - name: Verify deployment succeeded
        run: |
          if [ "${{ steps.deployment.outcome }}" = "success" ] \
            || [ "${{ steps.deployment2.outcome }}" = "success" ] \
            || [ "${{ steps.deployment3.outcome }}" = "success" ]; then
            echo "GitHub Pages deployment succeeded."
          else
            echo "::error::GitHub Pages deploy failed after 3 attempts. This is often transient — re-run the workflow, or check https://www.githubstatus.com"
            exit 1
          fi
