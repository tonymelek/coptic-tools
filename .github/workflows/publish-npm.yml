name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - coptic-antonios-unicode
          - coptic-pronounce
  push:
    tags:
      - v*

permissions:
  contents: read
  id-token: write

jobs:
  publish-antonios:
    if: >-
      github.event_name == 'push' ||
      inputs.package == 'all' ||
      inputs.package == 'coptic-antonios-unicode'
    runs-on: ubuntu-latest
    steps:
      - name: Require NPM_TOKEN secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is not set."
            echo "Create an npm Automation token, then add it at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: coptic-antonios-unicode/package-lock.json

      - name: Configure npm authentication
        working-directory: coptic-antonios-unicode
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cat > .npmrc <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          always-auth=true
          EOF

      - name: Install, build, publish
        working-directory: coptic-antonios-unicode
        run: |
          npm ci --ignore-scripts
          npm run build
          npm publish --access public --provenance --ignore-scripts

  publish-pronounce:
    if: >-
      github.event_name == 'push' ||
      inputs.package == 'all' ||
      inputs.package == 'coptic-pronounce'
    runs-on: ubuntu-latest
    steps:
      - name: Require NPM_TOKEN secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is not set."
            echo "Create an npm Automation token, then add it at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: coptic-pronounce/package-lock.json

      - name: Configure npm authentication
        working-directory: coptic-pronounce
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cat > .npmrc <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          always-auth=true
          EOF

      - name: Install, build, publish
        working-directory: coptic-pronounce
        run: |
          npm ci --ignore-scripts
          npm run build
          npm publish --access public --provenance --ignore-scripts
