name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - coptic-antonios-unicode
          - coptic-pronounce
  push:
    tags:
      - v*

permissions:
  contents: read
  id-token: write

env:
  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  publish-antonios:
    if: >-
      github.event_name == 'push' ||
      inputs.package == 'all' ||
      inputs.package == 'coptic-antonios-unicode'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coptic-antonios-unicode
    steps:
      - name: Check NPM_TOKEN secret
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is not set."
            echo "Add an npm Automation token at Settings → Secrets → Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: coptic-antonios-unicode/package-lock.json

      - name: Install, build, publish
        run: |
          npm ci --ignore-scripts
          npm run build
          npm publish --access public --provenance --ignore-scripts

  publish-pronounce:
    if: >-
      github.event_name == 'push' ||
      inputs.package == 'all' ||
      inputs.package == 'coptic-pronounce'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coptic-pronounce
    steps:
      - name: Check NPM_TOKEN secret
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is not set."
            echo "Add an npm Automation token at Settings → Secrets → Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: coptic-pronounce/package-lock.json

      - name: Install, build, publish
        run: |
          npm ci --ignore-scripts
          npm run build
          npm publish --access public --provenance --ignore-scripts
