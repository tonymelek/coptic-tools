name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - coptic-antonios-unicode
          - coptic-pronounce
  push:
    tags:
      - v*

jobs:
  publish-antonios:
    if: >-
      github.event_name == 'push' ||
      inputs.package == 'all' ||
      inputs.package == 'coptic-antonios-unicode'
    runs-on: ubuntu-latest
    steps:
      - name: Require NPM_TOKEN secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is not set."
            echo "Create an npm Automation token, then add it at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: coptic-antonios-unicode/package-lock.json

      - name: Configure npm authentication
        working-directory: coptic-antonios-unicode
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cat > .npmrc <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          always-auth=true
          EOF

      - name: Install and build
        working-directory: coptic-antonios-unicode
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Debug publish manifest
        working-directory: coptic-antonios-unicode
        run: |
          echo "=== package.json on disk ==="
          cat package.json
          echo "=== repository field ==="
          node -e "console.log(JSON.stringify(require('./package.json').repository, null, 2))"
          echo "=== tarball package.json ==="
          npm pack --pack-destination /tmp
          tar -xOzf /tmp/coptic-antonios-unicode-*.tgz package/package.json
          rm -f /tmp/coptic-antonios-unicode-*.tgz

      - name: Publish
        working-directory: coptic-antonios-unicode
        env:
          NPM_CONFIG_PROVENANCE: "false"
        run: npm publish --access public --ignore-scripts --provenance=false

  publish-pronounce:
    if: >-
      github.event_name == 'push' ||
      inputs.package == 'all' ||
      inputs.package == 'coptic-pronounce'
    runs-on: ubuntu-latest
    steps:
      - name: Require NPM_TOKEN secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is not set."
            echo "Create an npm Automation token, then add it at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: coptic-pronounce/package-lock.json

      - name: Configure npm authentication
        working-directory: coptic-pronounce
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cat > .npmrc <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          always-auth=true
          EOF

      - name: Install and build
        working-directory: coptic-pronounce
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Debug publish manifest
        working-directory: coptic-pronounce
        run: |
          echo "=== package.json on disk ==="
          cat package.json
          echo "=== repository field ==="
          node -e "console.log(JSON.stringify(require('./package.json').repository, null, 2))"
          echo "=== tarball package.json ==="
          npm pack --pack-destination /tmp
          tar -xOzf /tmp/coptic-pronounce-*.tgz package/package.json
          rm -f /tmp/coptic-pronounce-*.tgz

      - name: Publish
        working-directory: coptic-pronounce
        env:
          NPM_CONFIG_PROVENANCE: "false"
        run: npm publish --access public --ignore-scripts --provenance=false
